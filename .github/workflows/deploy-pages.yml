# Builds the Vite app and deploys static files to GitHub Pages.
#
# REQUIRED (once per repo): Settings → Pages → Build and deployment → Source: "GitHub Actions".
# If Source is still "Deploy from a branch" or Pages is disabled, deploy fails with HTTP 404.
#
# The FastAPI backend is NOT on Pages — set secret VITE_API_BASE_URL to your API origin, or API calls fail from the live site.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Default: project URL is https://user.github.io/RepoName/ → base /RepoName/
      # Custom domain (served at site root): set repo variable VITE_BASE to /
      # Settings → Secrets and variables → Actions → Variables → VITE_BASE
      - name: Install and build
        working-directory: frontend
        env:
          VITE_BASE: ${{ vars.VITE_BASE || format('/{0}/', github.event.repository.name) }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
